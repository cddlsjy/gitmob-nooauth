name: Lint & Check

on:
  pull_request:
    branches: [claude, develop]
  push:
    branches: [claude]

permissions:
  contents: read
  actions: read

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20 # 考虑到网络超时，稍微放宽一点点时间
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 使用官方 Gradle 动作，接管缓存和构建环境
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          # 即使构建失败，也会保存已经下载好的依赖，非常适合解决你遇到的超时问题
          cache-overwrite-existing: true

      - run: chmod +x gradlew

      - name: Stub secrets for lint
        run: |
          sed -i 's/YOUR_GITHUB_CLIENT_ID/stub_client_id/g' app/build.gradle.kts
          sed -i 's|YOUR_OAUTH_CALLBACK_URL|https://stub.example.com/callback|g' app/build.gradle.kts

      - name: Run Lint
        # 建议移除 --no-daemon，setup-gradle 对 daemon 模式有优化
        run: ./gradlew lintDebug
        
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
